# Per-target matrix CI for livespec-driver-codex.
#
# Family conventions scaled to this repo's content (thin SKILL.md
# bindings + plugin manifests + the plugin-shipped footgun guard + the
# e2e-cli harness consumer). Every step delegates to `just <target>`
# (direct tool invocations in `run:` lines are forbidden per livespec/
# SPECIFICATION/non-functional-requirements.md §"Toolchain pins").

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job.
# Combined with the ~/.cache/uv actions/cache step (keyed on uv.lock)
# the uv-sync step below uses, an unchanged lock installs from cache
# and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  check:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-plugin-structure
          - check-plugin-resolution
          - check-lint
          - check-format
          - check-hooks
          - check-e2e-cli
          - check-codex-skill-picker
          - check-heading-coverage
          - check-all-declared
          - check-assert-never-exhaustiveness
          - check-comment-line-anchors
          - check-file-lloc
          - check-global-writes
          - check-keyword-only-args
          - check-main-guard
          - check-match-keyword-only
          - check-no-inheritance
          - check-no-lloc-soft-warnings
          - check-no-write-direct
          - check-partition-completeness
          - check-private-calls
          - check-rop-pipeline-shape
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix) because it needs a second checkout — livespec core —
  # that no other target does.
  check-doctor-static:
    name: check-doctor-static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        env:
          LIVESPEC_CORE_PLUGIN_ROOT: ${{ github.workspace }}/.livespec-core/.claude-plugin
        run: just check-doctor-static

  # Red→Green→Replay commit-range gate (epic livespec-gcp2). A
  # lefthook-only gate is locally bypassable, and this fleet is
  # CI-authoritative, so the ritual MUST also run here. This is a
  # SEPARATE job from the `check` matrix because it has a distinct
  # checkout requirement: `check-red-green-replay` (no-arg) validates
  # the COMMIT RANGE origin/master..HEAD — every non-merge commit
  # touching product impl .py must carry EITHER the TDD-Red-*/TDD-Green-*
  # pair shape OR the TDD-Suite-Green-* shape, regardless of subject
  # prefix. It runs UNCONDITIONALLY: on a zero-.py PR the range carries
  # no product .py and trivially passes; on a master push the range is
  # empty. It NEVER silently passes — an unresolvable base fails the job
  # actionably.
  red-green-replay:
    name: check-red-green-replay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: the range validation enumerates
          # origin/master..HEAD and needs origin/master plus the merge
          # base present in the clone. A shallow (fetch-depth: 1)
          # checkout would make the base unresolvable and fail the
          # check actionably — never a silent pass.
          fetch-depth: 0

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just check-red-green-replay
        run: just check-red-green-replay

  export-telemetry:
    name: export-telemetry
    needs: [check, red-green-replay]
    if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'merge_group') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh

  # Single all-green gate job (livespec epic livespec-cf4bcu,
  # fleet-ci-aggregate-coverage). This is the SOLE branch-protection
  # required context: it `needs:` every check-bearing job, so requiring
  # only `ci-green` blocks merges on the entire matrix + dedicated check
  # jobs via one stable context-name that never churns as checks are
  # added. Pure GitHub-expression gate (no external action, no direct
  # tool invocation): `always()` runs it even when a dependency failed,
  # and the step fails the job iff any dependency failed or was cancelled.
  ci-green:
    name: ci-green
    needs: [check, check-doctor-static, red-green-replay]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
