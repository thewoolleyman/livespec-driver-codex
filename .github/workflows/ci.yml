# Per-target matrix CI for livespec-driver-codex.
#
# Family conventions scaled to this repo's content (thin SKILL.md
# bindings + plugin manifests + the plugin-shipped footgun guard + the
# e2e-cli harness consumer). Every step delegates to `just <target>`
# (direct tool invocations in `run:` lines are forbidden per livespec/
# SPECIFICATION/non-functional-requirements.md §"Toolchain pins").

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job.
# Combined with the ~/.cache/uv actions/cache step (keyed on uv.lock)
# the uv-sync step below uses, an unchanged lock installs from cache
# and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  check:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # fleet-ci-aggregate-coverage full parity (epic livespec-9z8h, S6):
        # this matrix RUNS every canonical `just check` aggregate slug so
        # check-ci-matrix-completeness passes, EXCEPT three deliberate
        # exclusions:
        #   - check-master-ci-green / check-branch-protection-alignment —
        #     WORLD-GATE checks (they verify master's CI + protection state,
        #     not the PR change; they enforce at pre-push under the
        #     maintainer's admin gh token and are excluded from the CI-mirror
        #     requirement per canonical_checks.world_gate_check_slugs and
        #     livespec/.ai/ci-gate-discipline.md).
        #   - check-red-green-replay / check-doctor-static — run in their own
        #     dedicated jobs below (the former needs full history to validate
        #     origin/master..HEAD; the latter needs a second livespec-core
        #     checkout).
        # The matrix also runs this repo's private extras (plugin structure,
        # resolution, lint, format, the hook tests, the e2e-cli harness, and
        # the live Codex TUI picker acceptance) so CI exercises them too.
        # The Checkout below uses fetch-depth: 0 because a few canonical
        # legs (check-check-coverage-incremental, check-commit-pairs-source-
        # and-test) diff origin/master..HEAD and need the base ref present.
        target:
          - check-agents-ai-references-resolve
          - check-aggregate-completeness
          - check-all-declared
          - check-assert-never-exhaustiveness
          - check-canonical-recipe-fidelity
          - check-check-coverage-incremental
          - check-check-mutation
          - check-check-tools
          - check-ci-matrix-completeness
          - check-claude-md-coverage
          - check-comment-line-anchors
          - check-commit-pairs-source-and-test
          - check-file-lloc
          - check-fleet-marketplace-relative-sources
          - check-global-writes
          - check-handoff-dispatch-routing
          - check-heading-coverage
          - check-keyword-only-args
          - check-local-memory-drift-audit
          - check-main-guard
          - check-match-keyword-only
          - check-newtype-domain-primitives
          - check-no-direct-destructive-cli
          - check-no-direct-tool-invocation
          - check-no-except-outside-io
          - check-no-fmt-directives
          - check-no-inheritance
          - check-no-lloc-soft-warnings
          - check-no-raise-outside-io
          - check-no-shadow-ledger-body-identical
          - check-no-todo-registry
          - check-no-write-direct
          - check-partition-completeness
          - check-pbt-coverage-pure-modules
          - check-per-file-coverage
          - check-plugin-resolution
          - check-primary-checkout-commit-refuse-hook-installed
          - check-private-calls
          - check-public-api-result-typed
          - check-rop-pipeline-shape
          - check-skill-invocation-paths
          - check-supervisor-discipline
          - check-tests-mirror-pairing
          - check-tests-no-subprocess-spawn
          - check-tool-backed-check-completeness
          - check-vendor-manifest
          - check-wrapper-shape
          # Repo-private extras (NOT canonical) — also exercised in CI.
          # check-lint / check-format / check-types / check-coverage are the
          # four fixed-policy tool-backed gates that
          # check-tool-backed-check-completeness requires as literal members
          # of BOTH the `just check` targets array AND a CI matrix.
          - check-plugin-structure
          - check-lint
          - check-format
          - check-types
          - check-coverage
          - check-hooks
          - check-e2e-cli
          - check-codex-skill-picker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: check-check-coverage-incremental and
          # check-commit-pairs-source-and-test enumerate origin/master..HEAD
          # and need origin/master plus the merge base in the clone. A
          # shallow (fetch-depth: 1) checkout would make the base
          # unresolvable and fail those legs. Cheap for this repo; harmless
          # for the other legs.
          fetch-depth: 0

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      # The check-primary-checkout-commit-refuse-hook-installed leg verifies
      # the canonical livespec commit-refuse hook is installed at
      # .git/hooks/{pre-commit,pre-push,commit-msg} and byte-identical to the
      # package's canonical body. actions/checkout clones a fresh tree with no
      # bootstrap run, so this leg installs the hook first by REUSING the
      # shared installer (via `just install-commit-refuse-hooks`, which runs
      # `uv run python -m livespec_dev_tooling.install_commit_refuse_hooks` —
      # hence AFTER uv sync, unlike the producer repo where the module is
      # importable by bare python3). Scoped to this leg alone; other legs are
      # unaffected by hook installation.
      - name: Install canonical commit-refuse hook (satisfy invariant)
        if: matrix.target == 'check-primary-checkout-commit-refuse-hook-installed'
        run: just install-commit-refuse-hooks

      - name: just ${{ matrix.target }}
        env:
          # Arm the CI-matrix drift guard (epic livespec-9z8h, S6): now that
          # this repo's matrix + ci-green are complete, flip
          # check-ci-matrix-completeness from warn (exit 0) to FAIL (exit 4),
          # so any future canonical slug wired into `just check` but dropped
          # from CI reddens this leg instead of silently warning. Harmless for
          # the other legs — they do not read this var.
          LIVESPEC_FAIL_IF_CI_MATRIX_GAPS_EXIST: "true"
        run: just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix) because it needs a second checkout — livespec core —
  # that no other target does.
  check-doctor-static:
    name: check-doctor-static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        env:
          LIVESPEC_CORE_PLUGIN_ROOT: ${{ github.workspace }}/.livespec-core/.claude-plugin
        run: just check-doctor-static

  # Red→Green→Replay commit-range gate (epic livespec-gcp2). A
  # lefthook-only gate is locally bypassable, and this fleet is
  # CI-authoritative, so the ritual MUST also run here. This is a
  # SEPARATE job from the `check` matrix because it has a distinct
  # checkout requirement: `check-red-green-replay` (no-arg) validates
  # the COMMIT RANGE origin/master..HEAD — every non-merge commit
  # touching product impl .py must carry EITHER the TDD-Red-*/TDD-Green-*
  # pair shape OR the TDD-Suite-Green-* shape, regardless of subject
  # prefix. It runs UNCONDITIONALLY: on a zero-.py PR the range carries
  # no product .py and trivially passes; on a master push the range is
  # empty. It NEVER silently passes — an unresolvable base fails the job
  # actionably.
  red-green-replay:
    name: check-red-green-replay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: the range validation enumerates
          # origin/master..HEAD and needs origin/master plus the merge
          # base present in the clone. A shallow (fetch-depth: 1)
          # checkout would make the base unresolvable and fail the
          # check actionably — never a silent pass.
          fetch-depth: 0

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just check-red-green-replay
        run: just check-red-green-replay

  export-telemetry:
    name: export-telemetry
    needs: [check, red-green-replay]
    if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'merge_group') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh

  # Single all-green gate job (livespec epic livespec-cf4bcu,
  # fleet-ci-aggregate-coverage). This is the SOLE branch-protection
  # required context: it `needs:` every check-bearing job, so requiring
  # only `ci-green` blocks merges on the entire matrix + dedicated check
  # jobs via one stable context-name that never churns as checks are
  # added. Pure GitHub-expression gate (no external action, no direct
  # tool invocation): `always()` runs it even when a dependency failed,
  # and the step fails the job iff any dependency failed or was cancelled.
  ci-green:
    name: ci-green
    needs: [check, check-doctor-static, red-green-replay]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
